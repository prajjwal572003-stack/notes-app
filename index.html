<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<meta charset="UTF-8">
<title>Notes App</title>
<link rel="stylesheet" href="style.css">
</head>
<button onclick="toggleDark()">🌙 Dark Mode</button>
<body>

<h1>📝 My Notes App</h1>

<div class="input-box">

<input type="text" id="title" placeholder="Note title">
<select id="category">
<option value="General">General</option>
<option value="Work">Work</option>
<option value="Study">Study</option>
<option value="Ideas">Ideas</option>
</select>


<textarea id="text" placeholder="Write your note"></textarea>
<input type="file" id="imageInput" accept="image/*">
<button onclick="exportPDF()">Download Notes PDF</button>
<button onclick="startVoice()">🎤 Speak Note</button>
<button onclick="addNote()">Add Note</button>
<select id="color">
<option value="white">White</option>
<option value="lightyellow">Yellow</option>
<option value="lightblue">Blue</option>
<option value="lightgreen">Green</option>
</select>
<select id="filter" onchange="filterNotes()">
<option value="All">All</option>
<option value="Work">Work</option>
<option value="Study">Study</option>
<option value="Ideas">Ideas</option>
</select>
<input type="datetime-local" id="reminder">

</div>

<input type="text" id="search" placeholder="Search notes..." onkeyup="searchNotes()">

<div id="notes"></div>

<script src="script.js"></script>

</body>
</html>
